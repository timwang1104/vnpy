<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市场研究</title>
<link rel="stylesheet" href="static/style.css">
</head>
<body>
<!-- 概览条 -->
<header id="overview-bar"></header>

<!-- Tab 导航 -->
<nav id="tab-nav">
  <a href="#industry" class="tab-link active">行业资金流</a>
  <a href="#limitup" class="tab-link">涨停池</a>
  <a href="#fundflow" class="tab-link">行业时序</a>
  <a href="#simulator" class="tab-link">模拟盘</a>
</nav>

<!-- Tab 内容 -->
<main>
  <!-- Tab1: 行业资金流 -->
  <section id="industry" class="tab-content active">
    <div class="chart-box">
      <h3>行业 × 日期 的 md_share 热力图</h3>
      <div id="chart-heat" class="chart-container"></div>
    </div>
    <div class="chart-box">
      <h3>最新交易日截面排名</h3>
      <div id="chart-rank" class="chart-container" style="height:500px"></div>
    </div>
    <div class="chart-box">
      <h3>前瞻 IC 时序 (md_share vs 未来5日收益)</h3>
      <div id="chart-ic" class="chart-container" style="height:280px"></div>
    </div>
    <div class="chart-box">
      <h3>五分组前瞻超额收益</h3>
      <div id="chart-quint" class="chart-container" style="height:300px"></div>
    </div>
  </section>

  <!-- Tab2: 涨停池 -->
  <section id="limitup" class="tab-content">
    <div class="date-row">
      <button id="btn-prev-day" class="btn">‹ 上一日</button>
      <div class="date-picker" id="date-picker">
        <span id="limitup-current-date" class="current-date dp-trigger">—</span>
        <div class="dp-popup" id="dp-popup">
          <div class="dp-header">
            <button class="dp-nav" id="dp-prev-month" type="button">‹</button>
            <span id="dp-month-year">—</span>
            <button class="dp-nav" id="dp-next-month" type="button">›</button>
          </div>
          <div class="dp-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
          <div class="dp-days" id="dp-days"></div>
        </div>
      </div>
      <button id="btn-next-day" class="btn">下一日 ›</button>
    </div>
    <div class="chart-box">
      <h3>涨停概况</h3>
      <div id="limitup-day-content"></div>
    </div>
    <div class="chart-box">
      <h3>连板高度时序</h3>
      <div id="chart-limitup" class="chart-container" style="height:200px"></div>
    </div>
  </section>

  <!-- Tab3: 行业时序 -->
  <section id="fundflow" class="tab-content">
    <div class="control-row">
      <label for="ff-industry-select">行业:</label>
      <select id="ff-industry-select" class="ff-select"></select>
      <label for="ff-mode-select" style="margin-left:16px">指标:</label>
      <select id="ff-mode-select" class="ff-select">
        <option value="raw">中单净额（亿元）</option>
        <option value="share">归一化 md_share</option>
        <option value="zscore">Z-score（60日滚动）</option>
      </select>
    </div>
    <!-- 异常行业提示区 -->
    <div id="ff-anomaly-banner" class="anomaly-banner">
      <div class="anomaly-banner-header">
        <span class="anomaly-title">🔴 异常行业检测</span>
        <div class="anomaly-threshold-group">
          <label>阈值 |z|&gt;</label>
          <button class="anomaly-threshold-btn" data-t="1.5">1.5</button>
          <button class="anomaly-threshold-btn active" data-t="2.0">2.0</button>
          <button class="anomaly-threshold-btn" data-t="2.5">2.5</button>
          <button class="anomaly-threshold-btn" data-t="3.0">3.0</button>
          <input type="number" id="ff-threshold-input" class="ff-threshold-input" value="2.0" step="0.1" min="1" max="5">
        </div>
        <span class="anomaly-meta" id="ff-anomaly-meta"></span>
      </div>
      <div class="anomaly-items" id="ff-anomaly-items"></div>
    </div>
    <div class="chart-box">
      <h3 id="ff-chart-title">行业时序</h3>
      <div id="chart-fundflow" class="chart-container" style="height:450px"></div>
    </div>
  </section>

  <!-- Tab4: 模拟盘 -->
  <section id="simulator" class="tab-content">
    <div class="sim-header">
      <h3>策略列表</h3>
      <button id="btn-sim-discover" class="btn">刷新策略</button>
    </div>

    <div id="sim-strategy-list" class="sim-strategy-list">
      <!-- 由 app.js 动态渲染 -->
      <p class="text-muted">加载中…</p>
    </div>

    <div id="sim-result-area" style="margin-top:20px">
      <!-- 策略运行结果展示（动态渲染） -->
      <div id="sim-result-header" class="sim-result-header" style="display:none">
        <h3>运行结果</h3>
        <div id="sim-result-summary" class="sim-result-summary"></div>
      </div>
      <div id="sim-result-charts">
        <div class="chart-box">
          <h4>权益曲线</h4>
          <div id="chart-sim-equity" class="chart-container" style="height:350px"></div>
        </div>
      </div>
      <div class="sim-tables" style="display:flex;gap:20px;flex-wrap:wrap">
        <div class="chart-box" style="flex:1;min-width:300px">
          <h4>持仓列表</h4>
          <div id="sim-positions-table" class="sim-table-wrap"></div>
        </div>
        <div class="chart-box" style="flex:1;min-width:400px">
          <h4>交易记录</h4>
          <div id="sim-trades-table" class="sim-table-wrap"></div>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<script src="static/app.js"></script>
</body>
</html>
